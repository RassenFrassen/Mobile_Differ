title: User Configured Command
description: Inform the device that it can continue past Setup Assistant and finish
  login.
payload:
  requesttype: UserConfigured
  supportedOS:
    iOS:
      introduced: '17.0'
      accessrights: None
      supervised: true
      requiresdep: true
      sharedipad:
        mode: required
        devicechannel: false
        userchannel: true
      userenrollment:
        mode: forbidden
    macOS:
      introduced: n/a
    tvOS:
      introduced: n/a
    visionOS:
      introduced: n/a
    watchOS:
      introduced: n/a
  content: Inform the device that it can continue past Setup Assistant and finish
    login. Only works on Shared iPads that have the AwaitUserConfiguration feature
    enabled.
notes:
- title: ''
  content: Refer to the following sections to determine supported channels and requirements.
